[build]
# Default: x86-64-v3 (AVX2) — safe for most modern x86 CPUs and containers.
# This avoids SIGILL in environments that lack AVX-512 (x86-64-v4).
#
# To build a fully native binary tuned to the exact host CPU (maximum throughput,
# not portable), override this flag at build time:
#
#   RUSTFLAGS="-C target-cpu=native" cargo build --profile dist
#
# To target a specific microarchitecture level instead:
#   x86-64-v2  — SSE4.2             (most virtual machines)
#   x86-64-v3  — AVX2               (this default)
#   x86-64-v4  — AVX-512            (select server CPUs: Skylake-X, Ice Lake, ...)
#   native      — whatever this host has (non-portable but fastest)
#
# The `native` feature flag in Cargo.toml is a doc-only hint; the actual
# instruction-set selection is controlled exclusively by RUSTFLAGS above.
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "force-frame-pointers=no",
]

[profile.release]
# These mirror the workspace [profile.release] but are set here too for tools
# invoked outside of cargo (e.g. flamegraph) that read config.toml directly.
lto            = "fat"
codegen-units  = 1
opt-level      = 3
panic          = "abort"
